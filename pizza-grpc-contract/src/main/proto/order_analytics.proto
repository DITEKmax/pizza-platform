syntax = "proto3";

option java_package = "edu.rutmiit.grpc";
option java_multiple_files = true;

package orderanalytics;

service OrderAnalytics {
  rpc AnalyzeOrder (AnalyzeOrderRequest) returns (OrderAnalysisResponse);
}

message AnalyzeOrderRequest {
  int64 order_id = 1;
  int64 customer_id = 2;
  double total_price = 3;
  int32 items_count = 4;
  int32 total_quantity = 5;
}

message OrderAnalysisResponse {
  int64 order_id = 1;
  int32 estimated_cooking_minutes = 2;
  string kitchen_load_level = 3;
  string priority_level = 4;
  double packaging_complexity_score = 5;
  string recommendation = 6;
}